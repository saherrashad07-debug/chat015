<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Chat</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121318">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #121318;
            --bg-card: rgba(30, 31, 38, 0.9);
            --bg-input: #252530;
            --text-main: #eaeaea;
            --text-muted: #8a8a9e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); height: 100vh; height: 100dvh; overflow: hidden; user-select: none; }
        
        .screen { display: none; flex-direction: column; height: 100%; }
        .screen.active { display: flex; }

        #login-screen, #password-screen {
            justify-content: center; align-items: center; padding: 20px;
            background: radial-gradient(circle at top right, #1f1f30 0%, var(--bg-main) 60%),
                        radial-gradient(circle at bottom left, #2a1525 0%, transparent 50%);
        }
        .login-card { text-align: center; padding: 50px 25px; width: 100%; max-width: 400px; }
        .login-card h1 { font-size: 30px; font-weight: 700; margin-bottom: 8px; color: #fff; letter-spacing: 1px; }
        .login-card p.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 45px; font-weight: 300; }
        
        .user-btn {
            display: block; width: 100%; padding: 22px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
            font-size: 17px; font-weight: 500; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            font-family: 'Poppins', sans-serif;
            background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); color: #fff;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .user-btn:active { transform: scale(0.97); }
        .user-btn .btn-icon { font-size: 28px; }
        .btn-saher:hover, .btn-saher:active { border-color: #9d7aea; box-shadow: 0 0 25px rgba(157, 122, 234, 0.15); }
        .btn-salma:hover, .btn-salma:active { border-color: #f472b6; box-shadow: 0 0 25px rgba(244, 114, 182, 0.15); }

        .pwd-input-group { display: flex; gap: 10px; width: 100%; margin-bottom: 20px; }
        .pwd-input-group input {
            flex: 1; background: var(--bg-input); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 18px 20px; color: var(--text-main);
            font-size: 24px; outline: none; text-align: center; letter-spacing: 8px;
            font-family: 'Poppins', sans-serif; transition: 0.3s;
        }
        .pwd-input-group input:focus { border-color: rgba(255,255,255,0.15); }
        .pwd-input-group button {
            background: linear-gradient(135deg, #7c5cbf 0%, #9d7aea 100%);
            border: none; padding: 0 30px; border-radius: 16px; color: white;
            font-weight: 600; cursor: pointer; font-family: 'Poppins'; font-size: 16px;
            box-shadow: 0 4px 15px rgba(125, 92, 191, 0.3);
        }
        .pwd-input-group button:active { transform: scale(0.95); }
        .back-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-family: 'Poppins'; font-size: 14px; text-decoration: underline; opacity: 0.7; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-10px); } 50% { transform: translateX(10px); } }
        .error-shake { animation: shake 0.4s; border-color: #ff4d4d !important; }

        #chat-screen { background: var(--bg-main); position: relative; }
        #chat-screen::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(157, 122, 234, 0.03) 0%, transparent 50%);
            z-index: 0; pointer-events: none;
        }

        .chat-header {
            background: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px; display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 2;
        }
        .header-avatar { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .header-info h3 { font-size: 17px; font-weight: 600; }
        .header-info span { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; font-weight: 400;}
        .online-dot { width: 8px; height: 8px; background: #00e676; border-radius: 50%; box-shadow: 0 0 8px rgba(0, 230, 118, 0.6); }
        .logout-btn { margin-right: auto; background: none; border: 1px solid rgba(255,255,255,0.1); color: #888; padding: 8px 12px; border-radius: 12px; cursor: pointer; font-family: 'Poppins'; font-size: 11px; font-weight: 500; letter-spacing: 0.5px; }
        .logout-btn:active { background: rgba(255,255,255,0.05); }

        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; z-index: 1; }
        .date-separator { align-self: center; background: rgba(255,255,255,0.06); padding: 6px 16px; border-radius: 12px; font-size: 12px; color: var(--text-muted); margin: 15px 0 10px 0; font-weight: 500; letter-spacing: 0.5px; }

        .message-wrapper { position: relative; overflow: hidden; border-radius: 22px; max-width: 80%; align-self: flex-start; touch-action: pan-y; }
        .message-wrapper.sent-wrapper { align-self: flex-end; }

        .reply-action-bg { position: absolute; top: 0; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: flex-start; padding-left: 20px; border-radius: 22px; }
        .reply-action-bg span { font-size: 24px; opacity: 0; transition: opacity 0.1s; color: #9d7aea; }
        .message-wrapper.swiping .reply-action-bg span { opacity: 1; }

        .message { position: relative; padding: 12px 16px; border-radius: 22px; font-size: 14px; line-height: 1.5; animation: popIn 0.3s ease; background: transparent; transition: transform 0.1s ease-out; z-index: 1; width: max-content; max-width: 100%; }
        @keyframes popIn { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .message.saher-sent { background: linear-gradient(135deg, #7c5cbf 0%, #9d7aea 100%); color: white; border-bottom-right-radius: 6px; box-shadow: 0 4px 15px rgba(125, 92, 191, 0.2); }
        .message.saher-received { background: #1e1e28; color: var(--text-main); border-bottom-left-radius: 6px; border: 1px solid rgba(255,255,255,0.04); }
        .message.salma-sent { background: linear-gradient(135deg, #db2777 0%, #f472b6 100%); color: white; border-bottom-right-radius: 6px; box-shadow: 0 4px 15px rgba(219, 39, 119, 0.2); }
        .message.salma-received { background: #1e1e28; color: var(--text-main); border-bottom-left-radius: 6px; border: 1px solid rgba(255,255,255,0.04); }

        .message-container { display: flex; flex-direction: column; }
        .message.saher-sent .message-container, .message.salma-sent .message-container { align-items: flex-end; }
        .message.saher-received .message-container, .message.salma-received .message-container { align-items: flex-start; }
        
        .message-text { word-wrap: break-word; padding-bottom: 2px; }
        .message-img { max-width: 220px; width: 100%; border-radius: 14px; margin-bottom: 4px; display: block; cursor: pointer; }
        
        .reply-preview-box { background: rgba(0,0,0,0.2); border-right: 3px solid rgba(255,255,255,0.5); padding: 6px 10px; border-radius: 8px; margin-bottom: 6px; width: 100%; max-width: 100%; }
        .message.saher-received .reply-preview-box { border-right: 3px solid #9d7aea; }
        .message.salma-received .reply-preview-box { border-right: 3px solid #f472b6; }
        .reply-preview-sender { font-size: 11px; font-weight: 600; margin-bottom: 2px; opacity: 0.8; }
        .reply-preview-text { font-size: 12px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        .message-meta { display: flex; align-items: center; gap: 4px; margin-top: 1px; }
        .message-meta .time { font-size: 10px; opacity: 0.6; font-weight: 400; }
        .checkmark { font-size: 14px; margin-right: 2px; color: rgba(255,255,255,0.4); font-weight: bold; }
        .checkmark.read { color: #53bdeb; }

        .reply-box-container { background: var(--bg-card); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); padding: 10px 20px; display: none; align-items: center; gap: 15px; z-index: 2; animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .reply-box-container.active { display: flex; }
        .reply-box-content { flex: 1; border-right: 3px solid #9d7aea; padding-right: 10px; }
        .reply-box-sender { font-size: 12px; font-weight: 600; color: #9d7aea; }
        .reply-box-text { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .reply-cancel-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 5px; }

        .chat-footer { padding: 15px 15px 15px 10px; background: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 10px; align-items: center; z-index: 2; }
        .chat-footer input { flex: 1; background: var(--bg-input); border: 1px solid rgba(255,255,255,0.05); border-radius: 30px; padding: 16px 25px; color: var(--text-main); font-size: 14px; outline: none; font-family: 'Poppins', sans-serif; transition: 0.3s; }
        .chat-footer input:focus { border-color: rgba(255,255,255,0.15); background: #2a2a38; }
        
        .attach-btn { width: 48px; height: 48px; border-radius: 50%; border: none; background: rgba(255,255,255,0.05); color: var(--text-muted); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .attach-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.9); }

        .send-btn { width: 52px; height: 52px; border-radius: 50%; border: none; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .send-btn.saher-btn { background: linear-gradient(135deg, #7c5cbf 0%, #9d7aea 100%); }
        .send-btn.salma-btn { background: linear-gradient(135deg, #db2777 0%, #f472b6 100%); }
        .send-btn:active { transform: scale(0.92); }
        
        #chat-messages::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="login-card">
            <h1>Welcome Back 💎</h1>
            <p class="subtitle">Select your identity to continue</p>
            <button class="user-btn btn-saher" onclick="selectUser('Saher')">
                <span class="btn-icon">🌙</span> Continue as Saher
            </button>
            <button class="user-btn btn-salma" onclick="selectUser('Salma')">
                <span class="btn-icon">🦋</span> Continue as Salma
            </button>
        </div>
    </div>

    <div id="password-screen" class="screen">
        <div class="login-card">
            <h1>Enter PIN 🔐</h1>
            <p class="subtitle" id="pwd-subtitle">for Saher</p>
            <div class="pwd-input-group">
                <input type="password" id="pwd-input" placeholder="•••" maxlength="10" onkeypress="handlePwdKeyPress(event)">
                <button onclick="submitPassword()">GO</button>
            </div>
            <button class="back-btn" onclick="goBackToUsers()">Back to Users</button>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="chat-header">
            <div class="header-avatar" id="header-avatar">🦋</div>
            <div class="header-info">
                <h3 id="header-name">Salma</h3>
                <span><div class="online-dot"></div> Online</span>
            </div>
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>
        
        <div id="chat-messages"></div>

        <div class="reply-box-container" id="reply-box">
            <div class="reply-box-content">
                <div class="reply-box-sender" id="reply-box-sender">Saher</div>
                <div class="reply-box-text" id="reply-box-text">Message</div>
            </div>
            <button class="reply-cancel-btn" onclick="cancelReply()">✕</button>
        </div>

        <div class="chat-footer">
            <label class="attach-btn">
                🖼️
                <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            </label>
            <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

    <script>
        let currentUser = '';
        let otherUser = '';
        let selectedUser = '';
        let messagesRef;
        let otherUserLastRead = 0;
        let activeReply = null;
        let lastDisplayedDate = '';
        const CORRECT_PWD = "123";

        const firebaseConfig = {
            apiKey: "AIzaSyDUh6YBeCQLva-AisywxtmOzSe_dk4uDSE",
            authDomain: "my-chat-f2a2d.firebaseapp.com",
            databaseURL: "https://my-chat-f2a2d-default-rtdb.firebaseio.com",
            projectId: "my-chat-f2a2d",
            storageBucket: "my-chat-f2a2d.firebasestorage.app",
            messagingSenderId: "394708901828",
            appId: "1:394708901828:web:e7460d8117d2b7b11cce91"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const storage = firebase.storage();

        function selectUser(user) {
            selectedUser = user;
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('password-screen').classList.add('active');
            document.getElementById('pwd-subtitle').innerText = `for ${user}`;
            document.getElementById('pwd-input').value = '';
            setTimeout(() => document.getElementById('pwd-input').focus(), 300);
        }

        function goBackToUsers() {
            document.getElementById('password-screen').classList.remove('active');
            document.getElementById('login-screen').classList.add('active');
        }

        function handlePwdKeyPress(e) { if (e.key === 'Enter') submitPassword(); }

        function submitPassword() {
            const pwdInput = document.getElementById('pwd-input');
            const pwd = pwdInput.value.trim();

            if (pwd === CORRECT_PWD) {
                loginAs(selectedUser);
            } else {
                pwdInput.classList.add('error-shake');
                setTimeout(() => pwdInput.classList.remove('error-shake'), 400);
                pwdInput.value = '';
            }
        }

        function loginAs(user) {
            currentUser = user;
            otherUser = (user === 'Saher') ? 'Salma' : 'Saher';
            messagesRef = database.ref('messages');
            
            document.getElementById('password-screen').classList.remove('active');
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('chat-screen').classList.add('active');
            
            document.getElementById('header-name').innerText = otherUser;
            document.getElementById('header-avatar').innerText = (otherUser === 'Salma') ? '🦋' : '🌙';

            if(user === 'Saher') { document.getElementById('send-btn').classList.add('saher-btn'); } 
            else { document.getElementById('send-btn').classList.add('salma-btn'); }

            database.ref('lastRead/' + currentUser).set(firebase.database.ServerValue.TIMESTAMP);
            database.ref('lastRead/' + otherUser).on('value', (snapshot) => {
                otherUserLastRead = snapshot.val() || 0;
                updateCheckmarks();
            });

            loadMessages();
            initSwipe();
        }

        function logout() {
            if(messagesRef) messagesRef.off();
            document.getElementById('chat-screen').classList.remove('active');
            document.getElementById('login-screen').classList.add('active');
            document.getElementById('chat-messages').innerHTML = '';
            document.getElementById('send-btn').className = 'send-btn';
            lastDisplayedDate = '';
        }

        function getDateKey(timestamp) { return new Date(timestamp).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }); }

        function formatSeparatorDate(timestamp) {
            const today = new Date();
            const msgDate = new Date(timestamp);
            if(getDateKey(today) === getDateKey(msgDate)) return "Today";
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            if(getDateKey(yesterday) === getDateKey(msgDate)) return "Yesterday";
            return getDateKey(msgDate);
        }

        function loadMessages() {
            messagesRef.orderByChild('timestamp').on('child_added', (snapshot) => {
                const data = snapshot.val();
                const msgId = snapshot.key;
                
                if (data.sender !== currentUser) {
                    database.ref('lastRead/' + currentUser).set(firebase.database.ServerValue.TIMESTAMP);
                }

                const msgDateKey = getDateKey(data.timestamp);
                if (msgDateKey !== lastDisplayedDate) {
                    lastDisplayedDate = msgDateKey;
                    const sep = document.createElement('div');
                    sep.className = 'date-separator';
                    sep.innerText = formatSeparatorDate(data.timestamp);
                    document.getElementById('chat-messages').appendChild(sep);
                }

                appendMessage(data.sender, data.text, msgId, data.timestamp, data.replyTo, data.type);
            });
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

        function setReply(sender, text) {
            activeReply = { sender, text };
            document.getElementById('reply-box-sender').innerText = sender;
            document.getElementById('reply-box-text').innerText = text;
            document.getElementById('reply-box').classList.add('active');
            document.getElementById('msg-input').focus();
        }

        function cancelReply() {
            activeReply = null;
            document.getElementById('reply-box').classList.remove('active');
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            let payload = { sender: currentUser, text: text, type: "text", timestamp: firebase.database.ServerValue.TIMESTAMP };

            if (activeReply) { payload.replyTo = activeReply; cancelReply(); }

            messagesRef.push(payload);
            input.value = '';
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const input = document.getElementById('msg-input');
            input.value = "Sending...";
            input.disabled = true;

            const fileName = Date.now() + '_' + file.name;
            const storageRef = storage.ref('chat_images/' + fileName);

            const uploadTask = storageRef.put(file);

            uploadTask.on('state_changed', null, 
                (error) => { input.value = ""; input.disabled = false; alert("Upload failed"); }, 
                () => {
                    uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
                        let payload = { sender: currentUser, text: downloadURL, type: "image", timestamp: firebase.database.ServerValue.TIMESTAMP };
                        if (activeReply) { payload.replyTo = activeReply; cancelReply(); }
                        messagesRef.push(payload);
                        input.value = "";
                        input.disabled = false;
                        document.getElementById('file-input').value = '';
                    });
                }
            );
        }

        function formatTime(timestamp) {
            if(!timestamp) return '';
            return new Date(timestamp).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        function appendMessage(sender, text, msgId, timestamp, replyTo, type) {
            const chatBox = document.getElementById('chat-messages');
            const wrapper = document.createElement('div');
            
            let msgClass = '';
            let isSent = false;
            if (sender === 'Saher') {
                msgClass = (currentUser === 'Saher') ? 'message saher-sent' : 'message saher-received';
                isSent = (currentUser === 'Saher');
            } else {
                msgClass = (currentUser === 'Salma') ? 'message salma-sent' : 'message salma-received';
                isSent = (currentUser === 'Salma');
            }

            wrapper.className = isSent ? 'message-wrapper sent-wrapper' : 'message-wrapper';

            let isRead = isSent && (timestamp <= otherUserLastRead);
            let checkmarkHtml = isSent ? `<span class="checkmark ${isRead ? 'read' : ''}">${isRead ? '✓✓' : '✓'}</span>` : '';

            let replyHtml = '';
            if (replyTo) {
                replyHtml = `<div class="reply-preview-box"><div class="reply-preview-sender">${replyTo.sender}</div><div class="reply-preview-text">${replyTo.text}</div></div>`;
            }

            let contentHtml = '';
            if (type === 'image') {
                contentHtml = `<img src="${text}" class="message-img" onclick="window.open(this.src)">`;
            } else {
                contentHtml = `<span class="message-text">${text}</span>`;
            }

            wrapper.innerHTML = `
                <div class="reply-action-bg"><span>↩️</span></div>
                <div class="${msgClass}" data-sender="${sender}" data-id="${msgId}" data-timestamp="${timestamp}" data-type="${type || 'text'}">
                    <div class="message-container">
                        ${replyHtml}
                        ${contentHtml}
                        <div class="message-meta">
                            <span class="time">${formatTime(timestamp)}</span>
                            ${checkmarkHtml}
                        </div>
                    </div>
                </div>
            `;
            
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function updateCheckmarks() {
            const sentMessages = document.querySelectorAll('.message.saher-sent, .message.salma-sent');
            sentMessages.forEach(msgDiv => {
                let msgTime = parseInt(msgDiv.dataset.timestamp);
                let checkEl = msgDiv.querySelector('.checkmark');
                if (checkEl) {
                    if (msgTime <= otherUserLastRead) {
                        checkEl.classList.add('read');
                        checkEl.innerText = '✓✓';
                    } else {
                        checkEl.classList.remove('read');
                        checkEl.innerText = '✓';
                    }
                }
            });
        }

        function initSwipe() {
            let start_X = 0;
            let start_Y = 0;
            let currentWrapper = null;
            let isDragging = false;
            let isHorizontal = null;

            const chatBox = document.getElementById('chat-messages');

            function onStart(e) {
                const target = e.target.closest('.message-wrapper');
                if (!target) return;
                currentWrapper = target;
                isDragging = true;
                isHorizontal = null;
                const touch = e.touches ? e.touches[0] : e;
                start_X = touch.clientX;
                start_Y = touch.clientY;
                currentWrapper.classList.remove('swiping');
            }

            function onMove(e) {
                if (!isDragging || !currentWrapper) return;
                const touch = e.touches ? e.touches[0] : e;
                let diffX = touch.clientX - start_X;
                let diffY = touch.clientY - start_Y;

                if (isHorizontal === null) {
                    if (Math.abs(diffX) > 10 || Math.abs(diffY) > 10) {
                        isHorizontal = Math.abs(diffX) > Math.abs(diffY);
                        if (!isHorizontal) { isDragging = false; currentWrapper = null; return; }
                    } else { return; }
                }

                const messageEl = currentWrapper.querySelector('.message');
                if (diffX > 0) {
                    messageEl.style.transform = `translateX(${Math.min(diffX, 80)}px)`;
                    if(diffX > 20) currentWrapper.classList.add('swiping');
                } else {
                    messageEl.style.transform = `translateX(0)`;
                    currentWrapper.classList.remove('swiping');
                }
            }

            function onEnd(e) {
                if (!isDragging || !currentWrapper) return;
                const touch = e.changedTouches ? e.changedTouches[0] : e;
                let diffX = touch.clientX - start_X;
                const messageEl = currentWrapper.querySelector('.message');
                
                if (diffX > 60) {
                    const sender = messageEl.dataset.sender;
                    let text = "[Image]";
                    if(messageEl.dataset.type === 'text') { text = messageEl.querySelector('.message-text').innerText; }
                    setReply(sender, text);
                }
                
                messageEl.style.transform = 'translateX(0)';
                currentWrapper.classList.remove('swiping');
                isDragging = false;
                currentWrapper = null;
            }

            chatBox.addEventListener('touchstart', onStart, { passive: true });
            chatBox.addEventListener('touchmove', onMove, { passive: true });
            chatBox.addEventListener('touchend', onEnd, { passive: true });

            if (!('ontouchstart' in window)) {
                chatBox.addEventListener('mousedown', onStart);
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onEnd);
            }
        }
    </script>
</body>
</html>
